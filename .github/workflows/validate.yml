name: Validate

on:
  pull_request:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff format check
        run: ruff format --check custom_components/wattpilot/*.py
        continue-on-error: true

      - name: Run ruff lint
        run: ruff check custom_components/wattpilot/*.py --output-format=github
        continue-on-error: true

  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if manifest.json changed
        id: manifest_changed
        run: |
          if git diff --name-only origin/master...HEAD | grep -q "custom_components/wattpilot/manifest.json"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate version format
        if: steps.manifest_changed.outputs.changed == 'true'
        run: |
          VERSION=$(jq -r '.version' custom_components/wattpilot/manifest.json)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Version must be in format X.Y.Z (e.g., 0.3.8)"
            exit 1
          fi
          echo "✅ Valid version format: $VERSION"

      - name: Check changelog updated
        if: steps.manifest_changed.outputs.changed == 'true'
        run: |
          VERSION=$(jq -r '.version' custom_components/wattpilot/manifest.json)
          if ! grep -q "\[$VERSION\]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md does not contain an entry for version $VERSION"
            echo "Please update CHANGELOG.md with release notes for this version"
            exit 1
          fi
          echo "✅ CHANGELOG.md contains entry for version $VERSION"

  hacs-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

  quality-scale:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate quality_scale.yaml
        run: |
          python3 << 'EOF'
          import sys
          import yaml

          with open('custom_components/wattpilot/quality_scale.yaml', encoding='utf-8') as f:
              quality_scale = yaml.safe_load(f)

          if not isinstance(quality_scale, dict):
              print('❌ quality_scale.yaml must contain a mapping at the top level')
              sys.exit(1)

          tier = quality_scale.get('tier')
          rules = quality_scale.get('rules')

          if tier is None:
              print('❌ Missing tier in quality_scale.yaml')
              sys.exit(1)

          if rules is None:
              print('❌ Missing rules in quality_scale.yaml')
              sys.exit(1)

          print(f'✅ quality_scale.yaml valid - tier: {tier} - rules: {len(rules) if isinstance(rules, dict) else "present"}')
          EOF
